<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="x-apple-disable-message-reformatting" />
        <title>Your verification code</title>
    </head>
    <body style="margin: 0; padding: 0; background: #f6f7fb; color: #111827">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background: #f6f7fb; padding: 24px 0">
            <tr>
                <td align="center" style="padding: 0 16px">
                    <table
                        role="presentation"
                        width="600"
                        cellspacing="0"
                        cellpadding="0"
                        style="
                            width: 100%;
                            max-width: 600px;
                            background: #ffffff;
                            border: 1px solid #e5e7eb;
                            border-radius: 12px;
                            overflow: hidden;
                        "
                    >
                        <tr>
                            <td align="center" style="padding: 20px 24px 8px 24px">
                                <img
                                    src="https://www.projectvu.com.au/brand/logo.webp"
                                    alt="Logo"
                                    style="height: 32px; width: auto; display: block"
                                />
                            </td>
                        </tr>
                        <tr>
                            <td style="padding: 8px 24px 8px 24px">
                                <div style="font-size: 20px; font-weight: 700; line-height: 1.2; margin: 0">Your verification code</div>
                            </td>
                        </tr>
                        <tr>
                            <td style="padding: 0 24px 16px 24px">
                                <div style="font-size: 14px; line-height: 1.6; color: #374151">
                                    Thanks for signing up. Use the one-time code below to verify your email address and finish setting up
                                    your account.
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td align="center" style="padding: 8px 24px 20px 24px">
                                <div
                                    style="
                                        display: inline-block;
                                        font-size: 24px;
                                        font-weight: 700;
                                        letter-spacing: 0.35em;
                                        padding: 12px 20px;
                                        border-radius: 10px;
                                        background: #f3f4f6;
                                        color: #111827;
                                    "
                                >
                                    {{ .Token }}
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td style="padding: 0 24px 20px 24px">
                                <div style="font-size: 12px; line-height: 1.6; color: #6b7280">
                                    This code is valid for a limited time and can only be used once. If you didn’t try to sign up, you can
                                    safely ignore this email.
                                </div>
                            </td>
                        </tr>
                    </table>

                    <div style="font-size: 12px; line-height: 1.6; color: #9ca3af; padding: 16px 8px 0 8px">© {{ .SiteURL }}</div>
                </td>
            </tr>
        </table>
    </body>
</html>
